<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCC Digital ID System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: "Inter", sans-serif;
    min-height: 135vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: url("/static/loginbg.png");
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden;
}
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 0;
    pointer-events: none;
}
.welcome-wrapper {
    position: relative;
    z-index: 1;
    text-align: center;
}
.welcome-card {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 20px 30px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    position: relative;
    animation: cardIn 0.8s ease-out;
}
.welcome-card::after {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 10px;
    border: 1.5px solid transparent;
    background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent, rgba(255,255,255,0.1)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
    animation: borderGlow 3s ease-in-out infinite;
}
.welcome-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.85rem 2.5rem;
    border-radius: 12px;
    font-weight: 600;
    font-size: 1rem;
    text-decoration: none;
    transition: all 0.25s ease;
    background: linear-gradient(135deg, #0088f8, #0088f7);
    color: #fff;
    box-shadow: 0 4px 16px rgba(46,125,50,0.35);
}
.welcome-btn:hover {
    transform: translateY(-2px);
    color: #fff;
}
@keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes borderGlow {
    0%, 100% { opacity: 0.4; }
    50%      { opacity: 1; }
}
.welcome-tagline {
    font-size: 1.15rem;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 0.03em;
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid rgba(255, 255, 255, 0.7);
    animation: typewriter 2.5s steps(30) 0.5s forwards, blinkCursor 0.8s step-end infinite;
    max-width: 0;
}
@keyframes typewriter {
    to { max-width: 30ch; }
}
@keyframes blinkCursor {
    50% { border-color: transparent; }
}
@media (max-width: 576px) {
    .welcome-card {
        padding: 24px 28px;
        gap: 1rem;
    }
    .welcome-btn {
        padding: 0.7rem 1.8rem;
        font-size: 0.9rem;
    }
    .welcome-tagline {
        font-size: 0.95rem;
    }
}
    </style>
</head>
<body>
    <div class="welcome-wrapper">
        <div class="welcome-card">
            <div class="welcome-tagline">Get Authenticated.</div>
            <a href="/login" class="welcome-btn">
                <i class="bi bi-box-arrow-in-right"></i>
                Sign In
            </a>
        </div>
    </div>
</body>
</html>
