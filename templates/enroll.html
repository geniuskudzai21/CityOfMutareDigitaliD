{% extends "base.html" %}
{% block content %}
<h2>Enroll Employee</h2>
<form id="enrollForm">
    <div class="mb-3">
        <label for="full_name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="full_name" name="full_name" required>
    </div>
    <div class="mb-3">
        <label for="role" class="form-label">Role</label>
        <input type="text" class="form-control" id="role" name="role">
    </div>
    <div class="mb-3">
        <label for="department" class="form-label">Department</label>
        <input type="text" class="form-control" id="department" name="department">
    </div>
    <div class="mb-3">
        <label for="contact" class="form-label">Contact</label>
        <input type="text" class="form-control" id="contact" name="contact">
    </div>

    <div class="mb-3">
        <label class="form-label">Photo</label>
        <div class="row">
            <div class="col-md-6">
                <video id="webcam" width="320" height="240" autoplay class="border rounded"></video>
            </div>
            <div class="col-md-6 d-flex flex-column align-items-center justify-content-center">
                <button type="button" id="captureBtn" class="btn btn-primary mb-2">Capture Photo</button>
                <canvas id="captureCanvas" hidden></canvas>
                <img id="photoPreview" class="img-thumbnail" style="max-width: 160px; display: none;">
            </div>
        </div>
    </div>

    <button type="submit" class="btn btn-success">Submit</button>
    <div id="statusMsg" class="mt-3"></div>
</form>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
{% endblock %}
