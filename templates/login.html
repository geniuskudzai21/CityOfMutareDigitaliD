{% extends "base.html" %}
{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <img src="{{ url_for('static', filename='mutarelogo.png') }}" alt="MCC" class="login-logo">
            <h1 class="login-title">MCC Digital ID System</h1>
        </div>
        {% if error %}
        <div class="alert alert-danger d-flex align-items-center gap-2 py-2 small">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}
        <form method="post" action="/login" autocomplete="off">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required autofocus autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>
            <button type="submit" class="btn w-100 login-btn">
                <i class="bi bi-box-arrow-in-right"></i>
                <span class="login-btn-text">Sign In</span>
                <span class="login-btn-spinner spinner-border spinner-border-sm" style="display:none;"></span>
            </button>
            <p class="login-footer">City of Mutare &mdash; Face Recognition Access Control</p>
        </form>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    var btn = this.querySelector(".login-btn");
    btn.querySelector(".login-btn-text").textContent = "Signing in...";
    btn.querySelector(".login-btn-spinner").style.display = "inline-block";
    btn.disabled = true;
});
</script>
{% endblock %}
