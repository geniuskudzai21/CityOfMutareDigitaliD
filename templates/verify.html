{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">Verify Identity</h2>
                <div class="row g-4">
                    <div class="col-md-7">
                        <div class="webcam-frame">
                            <video id="webcam" autoplay></video>
                            <div class="scan-overlay" id="scanOverlay">
                                <div class="scan-line"></div>
                                <div class="scan-corner-tl"></div>
                                <div class="scan-corner-tr"></div>
                                <div class="scan-corner-bl"></div>
                                <div class="scan-corner-br"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-5 d-flex flex-column justify-content-center gap-2">
                        <select id="siteSelect" class="form-select">
                            {% for c in centres %}
                            <option value="{{ c }}">{{ c }}</option>
                            {% endfor %}
                        </select>
                        <button type="button" id="scanBtn" class="btn btn-primary btn-lg mt-2"><i class="bi bi-camera me-1"></i>Scan Face</button>
                        <div id="spinner" class="text-center py-2" style="display: none;">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Scanning...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <canvas id="captureCanvas" hidden></canvas>
                <div id="statusMsg" class="mt-3"></div>

                <div id="resultPanel" style="display: none;">
                    <div id="matchResult" style="display: none;">
                        <div class="result-card verified mb-3">
                            <div class="result-icon"><i class="bi bi-check-circle-fill"></i></div>
                            <h3>MATCHED</h3>
                            <p id="resultName"></p>
                            <p id="resultRole"></p>
                            <p class="result-sub" id="resultDept"></p>
                        </div>
                        <div class="card border-0 bg-light">
                            <div class="card-body">
                                <h5 class="mb-3">Log Visit</h5>
                                <div class="mb-3">
                                    <label for="purposeSelect" class="form-label">Purpose of Visit</label>
                                    <select id="purposeSelect" class="form-select">
                                        <option value="">— Select —</option>
                                        <option value="Meeting">Meeting</option>
                                        <option value="Equipment Repair/Collection">Equipment Repair/Collection</option>
                                        <option value="Delivery">Delivery</option>
                                        <option value="Training">Training</option>
                                        <option value="Site Inspection">Site Inspection</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="notesInput" class="form-label">Notes (optional)</label>
                                    <textarea id="notesInput" class="form-control" rows="2"></textarea>
                                </div>
                                <div class="form-check form-switch mb-3">
                                    <input class="form-check-input" type="checkbox" id="gadgetToggle" role="switch">
                                    <label class="form-check-label" for="gadgetToggle">Bring in a gadget?</label>
                                </div>
                                <div id="gadgetSection" style="display: none;">
                                    <div id="gadgetEntries">
                                        <div class="gadget-entry card border p-2 mb-2">
                                            <div class="row g-2">
                                                <div class="col-md-4">
                                                    <select class="form-select form-select-sm gadget-type" required>
                                                        <option value="">Type</option>
                                                        <option value="Laptop">Laptop</option>
                                                        <option value="Phone">Phone</option>
                                                        <option value="Tablet">Tablet</option>
                                                        <option value="Hard Drive">Hard Drive</option>
                                                        <option value="Camera">Camera</option>
                                                        <option value="Other">Other</option>
                                                    </select>
                                                </div>
                                                <div class="col-md-4">
                                                    <input type="text" class="form-control form-control-sm gadget-name" placeholder="Gadget name" required>
                                                </div>
                                                <div class="col-md-4">
                                                    <input type="text" class="form-control form-control-sm gadget-serial" placeholder="Serial number (optional)">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <button type="button" id="addGadgetBtn" class="btn btn-outline-secondary btn-sm w-100 mb-3"><i class="bi bi-plus-circle me-1"></i>Add Another Gadget</button>
                                </div>
                                <button type="button" id="confirmBtn" class="btn btn-success w-100"><i class="bi bi-check-circle me-1"></i>Confirm & Log Visit</button>
                            </div>
                        </div>
                    </div>
                    <div id="noMatchResult" style="display: none;">
                        <div class="result-card unknown">
                            <div class="result-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
                            <h3>UNRECOGNIZED</h3>
                            <p>Face did not match any enrolled record.</p>
                            <p class="result-sub">This scan has been flagged for admin review.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
const video = document.getElementById("webcam");
const canvas = document.getElementById("captureCanvas");
const scanBtn = document.getElementById("scanBtn");
const confirmBtn = document.getElementById("confirmBtn");
const spinner = document.getElementById("spinner");
const overlay = document.getElementById("scanOverlay");
let lastMatch = null;

startWebcam(video);

scanBtn.addEventListener("click", async () => {
    const photo = captureFrame(video, canvas);
    const panel = document.getElementById("resultPanel");
    const matchResult = document.getElementById("matchResult");
    const noMatchResult = document.getElementById("noMatchResult");
    panel.style.display = "none";
    matchResult.style.display = "none";
    noMatchResult.style.display = "none";
    document.getElementById("statusMsg").innerHTML = "";
    scanBtn.disabled = true;
    spinner.style.display = "block";
    overlay.classList.add("active");

    try {
        const res = await fetch("/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                photo,
                site_name: document.getElementById("siteSelect").value,
            }),
        });
        const data = await res.json();

        setTimeout(() => {
            if (data.verified) {
                lastMatch = data;
                document.getElementById("resultName").textContent = data.full_name;
                document.getElementById("resultRole").textContent = data.role;
                document.getElementById("resultDept").textContent = data.department;
                matchResult.style.display = "block";
            } else {
                lastMatch = null;
                noMatchResult.style.display = "block";
            }
            panel.style.display = "block";
        }, 400);
    } catch {
        document.getElementById("statusMsg").innerHTML = '<div class="alert alert-danger">Network error.</div>';
    } finally {
        scanBtn.disabled = false;
        spinner.style.display = "none";
        overlay.classList.remove("active");
    }
});

document.getElementById("gadgetToggle").addEventListener("change", function () {
    document.getElementById("gadgetSection").style.display = this.checked ? "block" : "none";
});

document.getElementById("addGadgetBtn").addEventListener("click", function () {
    const entries = document.getElementById("gadgetEntries");
    const template = entries.querySelector(".gadget-entry");
    const clone = template.cloneNode(true);
    clone.querySelector(".gadget-name").value = "";
    clone.querySelector(".gadget-serial").value = "";
    clone.querySelector(".gadget-type").value = "";
    entries.appendChild(clone);
});

function collectGadgets() {
    if (!document.getElementById("gadgetToggle").checked) return [];
    const entries = document.querySelectorAll("#gadgetEntries .gadget-entry");
    const gadgets = [];
    entries.forEach(entry => {
        const type = entry.querySelector(".gadget-type").value;
        const name = entry.querySelector(".gadget-name").value.trim();
        if (type && name) {
            gadgets.push({
                gadget_type: type,
                gadget_name: name,
                serial_number: entry.querySelector(".gadget-serial").value.trim() || null,
            });
        }
    });
    return gadgets;
}

confirmBtn.addEventListener("click", async () => {
    if (!lastMatch) return;
    confirmBtn.disabled = true;
    try {
        const res = await fetch("/admin/confirm-visit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                employee_id: lastMatch.employee_id,
                site_name: document.getElementById("siteSelect").value,
                purpose: document.getElementById("purposeSelect").value || null,
                notes: document.getElementById("notesInput").value || null,
                gadgets: collectGadgets(),
            }),
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById("statusMsg").innerHTML = '<div class="alert alert-success">Visit logged successfully!</div>';
            document.getElementById("matchResult").style.display = "none";
            document.getElementById("resultPanel").style.display = "none";
            document.getElementById("gadgetToggle").checked = false;
            document.getElementById("gadgetSection").style.display = "none";
            lastMatch = null;
        }
    } catch {
        document.getElementById("statusMsg").innerHTML = '<div class="alert alert-danger">Network error.</div>';
    } finally {
        confirmBtn.disabled = false;
    }
});
</script>
{% endblock %}
