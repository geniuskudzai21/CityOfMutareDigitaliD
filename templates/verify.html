{% extends "base.html" %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h2 class="card-title mb-4">Verify Identity</h2>
        <div class="row mb-3">
            <div class="col-md-6">
                <video id="webcam" width="320" height="240" autoplay class="border rounded w-100"></video>
            </div>
            <div class="col-md-6 d-flex flex-column align-items-center justify-content-center">
                <select id="siteSelect" class="form-select mb-2">
                    <option value="Civic Centre">Civic Centre</option>
                    <option value="Sakubva">Sakubva</option>
                    <option value="Hobhouse">Hobhouse</option>
                </select>
                <input type="text" id="purposeInput" class="form-control mb-2" placeholder="Purpose of visit (optional)">
                <input type="text" id="notesInput" class="form-control mb-2" placeholder="Notes (optional)">
                <button type="button" id="scanBtn" class="btn btn-primary btn-lg">Scan Face</button>
                <div id="spinner" class="spinner-border text-primary mt-2" role="status" style="display: none;">
                    <span class="visually-hidden">Scanning...</span>
                </div>
            </div>
        </div>
        <canvas id="captureCanvas" hidden></canvas>

        <div id="statusMsg" class="mb-3"></div>

        <div id="resultPanel" class="card border-0 bg-light" style="display: none;">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3">
                        <img id="resultPhoto" class="img-fluid rounded">
                    </div>
                    <div class="col-md-9">
                        <h4 id="resultName"></h4>
                        <p id="resultRole" class="mb-1"></p>
                        <p id="resultDept" class="mb-1"></p>
                        <p id="resultBadge"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
const video = document.getElementById("webcam");
const canvas = document.getElementById("captureCanvas");
const scanBtn = document.getElementById("scanBtn");
const spinner = document.getElementById("spinner");

startWebcam(video);

scanBtn.addEventListener("click", async () => {
    const photo = captureFrame(video, canvas);
    const panel = document.getElementById("resultPanel");
    panel.style.display = "none";
    document.getElementById("statusMsg").innerHTML = "";
    scanBtn.disabled = true;
    spinner.style.display = "inline-block";

    try {
        const res = await fetch("/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                photo,
                site_name: document.getElementById("siteSelect").value,
                purpose: document.getElementById("purposeInput").value || null,
                notes: document.getElementById("notesInput").value || null,
            }),
        });
        const data = await res.json();

        if (data.verified) {
            document.getElementById("resultPhoto").src = data.photo_url;
            document.getElementById("resultName").textContent = data.full_name;
            document.getElementById("resultRole").textContent = data.role;
            document.getElementById("resultDept").textContent = data.department;
            document.getElementById("resultBadge").innerHTML = '<span class="badge bg-success fs-5">VERIFIED</span>';
        } else {
            document.getElementById("resultPhoto").src = "";
            document.getElementById("resultName").textContent = "";
            document.getElementById("resultRole").textContent = "";
            document.getElementById("resultDept").textContent = "";
            document.getElementById("resultBadge").innerHTML = '<span class="badge bg-danger fs-5">UNKNOWN PERSON</span>';
        }
        panel.style.display = "block";
    } catch {
        document.getElementById("statusMsg").innerHTML = '<div class="alert alert-danger">Network error.</div>';
    } finally {
        scanBtn.disabled = false;
        spinner.style.display = "none";
    }
});
</script>
{% endblock %}
