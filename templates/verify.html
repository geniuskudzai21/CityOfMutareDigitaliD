{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="card-title mb-4">Verify Identity</h2>
                <div class="row g-4">
                    <div class="col-md-7">
                        <div class="webcam-frame">
                            <video id="webcam" autoplay></video>
                            <div class="scan-overlay" id="scanOverlay">
                                <div class="scan-line"></div>
                                <div class="scan-corner-tl"></div>
                                <div class="scan-corner-tr"></div>
                                <div class="scan-corner-bl"></div>
                                <div class="scan-corner-br"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-5 d-flex flex-column justify-content-center gap-2">
                        <select id="siteSelect" class="form-select">
                            <option value="Civic Centre">Civic Centre</option>
                            <option value="Sakubva">Sakubva</option>
                            <option value="Hobhouse">Hobhouse</option>
                        </select>
                        <input type="text" id="purposeInput" class="form-control" placeholder="Purpose of visit (optional)">
                        <input type="text" id="notesInput" class="form-control" placeholder="Notes (optional)">
                        <button type="button" id="scanBtn" class="btn btn-primary btn-lg mt-2">Scan Face</button>
                        <div id="spinner" class="text-center py-2" style="display: none;">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Scanning...</span>
                            </div>
                        </div>
                    </div>
                </div>
                <canvas id="captureCanvas" hidden></canvas>
                <div id="statusMsg" class="mt-3"></div>
                <div id="resultPanel" style="display: none;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
const video = document.getElementById("webcam");
const canvas = document.getElementById("captureCanvas");
const scanBtn = document.getElementById("scanBtn");
const spinner = document.getElementById("spinner");
const overlay = document.getElementById("scanOverlay");

startWebcam(video);

function showResult(data) {
    const panel = document.getElementById("resultPanel");
    if (data.verified) {
        panel.innerHTML =
            '<div class="result-card verified">' +
            '<div class="result-icon"><i class="bi bi-check-circle-fill"></i></div>' +
            '<h3>VERIFIED</h3>' +
            '<p><strong>' + data.full_name + '</strong></p>' +
            '<p>' + (data.role || '') + '</p>' +
            '<p class="result-sub">' + (data.department || '') + '</p>' +
            '</div>';
    } else {
        panel.innerHTML =
            '<div class="result-card unknown">' +
            '<div class="result-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>' +
            '<h3>UNKNOWN PERSON</h3>' +
            '<p>Face did not match any enrolled record.</p>' +
            '<p class="result-sub">This scan has been flagged for admin review.</p>' +
            '</div>';
    }
    panel.style.display = "block";
}

scanBtn.addEventListener("click", async () => {
    const photo = captureFrame(video, canvas);
    document.getElementById("resultPanel").style.display = "none";
    document.getElementById("statusMsg").innerHTML = "";
    scanBtn.disabled = true;
    spinner.style.display = "block";
    overlay.classList.add("active");

    try {
        const res = await fetch("/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                photo,
                site_name: document.getElementById("siteSelect").value,
                purpose: document.getElementById("purposeInput").value || null,
                notes: document.getElementById("notesInput").value || null,
            }),
        });
        const data = await res.json();
        setTimeout(() => showResult(data), 400);
    } catch {
        document.getElementById("statusMsg").innerHTML = '<div class="alert alert-danger">Network error.</div>';
    } finally {
        scanBtn.disabled = false;
        spinner.style.display = "none";
        overlay.classList.remove("active");
    }
});
</script>
{% endblock %}
