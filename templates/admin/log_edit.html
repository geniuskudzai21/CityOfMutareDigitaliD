{% extends "base.html" %}
{% block content %}
<h2 class="mb-4">Edit Log Entry</h2>
<div class="card shadow-sm p-3">
    <form method="post">
        <div class="mb-3">
            <label class="form-label">Date / Time</label>
            <div class="form-control">{{ log.timestamp }}</div>
        </div>
        <div class="mb-3">
            <label for="employee_id" class="form-label">Assign to Employee</label>
            <select name="employee_id" id="employee_id" class="form-select">
                <option value="">-- Leave unassigned --</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}" {% if log.employee_id == emp.id %}selected{% endif %}>{{ emp.full_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label for="purpose" class="form-label">Purpose</label>
            <input name="purpose" id="purpose" class="form-control" value="{{ log.purpose or '' }}">
        </div>
        <div class="mb-3">
            <label for="notes" class="form-label">Notes</label>
            <textarea name="notes" id="notes" class="form-control">{{ log.notes or '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button class="btn btn-primary">Save</button>
            <a href="{{ url_for('admin_logs') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
