{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-12 col-lg-7">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center gap-3 mb-4">
                    <a href="{{ url_for('admin_employees') }}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left"></i>
                    </a>
                    <div>
                        <h2 class="card-title mb-0">Edit Employee</h2>
                        <div class="hint">Update staff details below.</div>
                    </div>
                </div>

                <form method="post">
                    <div class="row g-3 mb-3">
                        {% if emp.photo_path %}
                        {% set _fname = emp.photo_path.replace('\\','/').split('/')[-1] %}
                        <div class="col-12 text-center mb-2">
                            <img src="{{ url_for('static', filename='enrolled_photos/' ~ _fname) }}" alt="photo" class="rounded border" style="width:215px;height:215px;object-fit:cover">
                        </div>
                        {% endif %}
                        <div class="col-12">
                            <label for="full_name" class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" class="form-control form-control-lg" id="full_name" name="full_name" value="{{ emp.full_name }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="role" class="form-label">Role</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-briefcase"></i></span>
                                <input type="text" class="form-control" id="role" name="role" value="{{ emp.role or '' }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="department" class="form-label">Department</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-building"></i></span>
                                <select class="form-select" id="department" name="department">
                                    <option value="">— Department —</option>
                                    {% for d in departments %}
                                    <option value="{{ d }}" {% if emp.department == d %}selected{% endif %}>{{ d }}</option>
                                    {% endfor %}
                                    <option value="__other__" {% if emp.department and emp.department not in departments %}selected{% endif %}>Other...</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 {% if not (emp.department and emp.department not in departments) %}d-none{% endif %}" id="otherDeptWrap">
                            <label for="department_other" class="form-label">Other Department</label>
                            <input type="text" class="form-control" id="department_other" name="department_other" value="{{ emp.department if emp.department and emp.department not in departments else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label for="contact" class="form-label">Contact</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                <input type="text" class="form-control" id="contact" name="contact" value="{{ emp.contact or '' }}">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="centre" class="form-label">Site</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                <select class="form-select" id="centre" name="centre">
                                    <option value="">— Select —</option>
                                    {% for c in centres %}
                                    <option value="{{ c }}" {% if emp.centre == c %}selected{% endif %}>{{ c }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success btn-lg flex-grow-1">Save Changes</button>
                        <a href="{{ url_for('admin_employees') }}" class="btn btn-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var deptSelect = document.getElementById('department');
    var otherWrap = document.getElementById('otherDeptWrap');
    var otherInput = document.getElementById('department_other');
    function toggleOther() {
        if (deptSelect.value === '__other__') {
            otherWrap.classList.remove('d-none');
            otherInput.required = true;
        } else {
            otherWrap.classList.add('d-none');
            otherInput.required = false;
        }
    }
    deptSelect.addEventListener('change', toggleOther);
    toggleOther();
})();
</script>
{% endblock %}
