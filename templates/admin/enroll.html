{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12">
        <div class="card shadow-sm">
            <div class="card-body">
                <div class="enroll-intro mb-3">
                    <div>
                        <h2 class="card-title mb-0">Enroll Employee</h2>
                        <div class="hint">Capture a clear headshot and fill in staff details to enroll an employee.</div>
                    </div>
                </div>
                <form id="enrollForm">
                    <div class="row align-items-start">
                        <div class="col-lg-6">
                            <div class="card border-0 bg-light mb-1" style="max-width:490px;width:100%;">
                                    <div class="card-body p-2 text-center">
                                    <div class="webcam-frame mx-auto mb-3" style="max-width:470px;width:100%;">
                                        <video id="webcam" autoplay class="w-100 rounded" style="object-fit:cover"></video>
                                        <img id="webcamFreeze" alt="Frozen frame" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;" />
                                        <div class="scan-overlay" id="scanOverlay">
                                            <div class="scan-line"></div>
                                            <div class="scan-corner-tl"></div>
                                            <div class="scan-corner-tr"></div>
                                            <div class="scan-corner-bl"></div>
                                            <div class="scan-corner-br"></div>
                                        </div>
                                    </div>
                                    <div class="d-flex gap-2 justify-content-center">
                                        <button type="button" id="flipBtn" class="btn btn-outline-secondary" onclick="switchCamera(document.getElementById('webcam'))"><i class="bi bi-camera-reels me-1"></i>Flip Camera</button>
                                        <button type="button" id="captureBtn" class="btn btn-primary"><i class="bi bi-camera me-1"></i>Capture Photo</button>
                                        <button type="button" id="retakeBtn" class="btn btn-outline-secondary d-none"><i class="bi bi-arrow-counterclockwise me-1"></i>Retake</button>
                                    </div>
                                    <canvas id="captureCanvas" hidden></canvas>
                                    <div id="photoError" class="text-danger small mt-2" style="display: none;"></div>
                                </div>
                            </div>
                                    <!-- Preview shown in webcam space; no separate preview below -->
                        </div>
                        <div class="col-lg-6">
                            <div class="card shadow-sm">
                                <div class="card-body">
                                    <div class="mb-3">
                                        <label for="full_name" class="form-label">Full Name</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                                            <input type="text" class="form-control form-control-lg" id="full_name" name="full_name" required>
                                        </div>
                                    </div>
                                    <div class="row g-2 mb-3">
                                        <div class="col-12 col-md-6">
                                            <label for="role" class="form-label">Role</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-briefcase"></i></span>
                                                <input type="text" class="form-control" id="role" name="role">
                                            </div>
                                        </div>
                                        <div class="col-12 col-md-6">
                                            <label for="department" class="form-label">Department</label>
                                            <div class="input-group">
                                                <span class="input-group-text"><i class="bi bi-building"></i></span>
                                                <select class="form-select" id="department" name="department">
                                                    <option value="">Department</option>
                                                    {% for d in departments %}
                                                    <option value="{{ d }}">{{ d }}</option>
                                                    {% endfor %}
                                                    <option value="__other__">Other...</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-3 d-none" id="otherDeptWrap">
                                        <label for="department_other" class="form-label">Other Department</label>
                                        <input type="text" class="form-control" id="department_other" name="department_other">
                                    </div>
                                    <div class="mb-3">
                                        <label for="contact" class="form-label">Contact</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                                            <input type="text" class="form-control" id="contact" name="contact">
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label for="centre" class="form-label">Centre</label>
                                        <div class="input-group">
                                            <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
                                            <select class="form-select" id="centre" name="centre">
                                                <option value="">Centre</option>
                                                {% for c in centres %}
                                                <option value="{{ c }}">{{ c }}</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                    </div>
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-success btn-lg"><i class="bi bi-check-lg me-1"></i>Submit Enrollment</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="statusMsg" class="mt-3"></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/camera.js') }}"></script>
<script>
let capturedImage = null;

const video = document.getElementById("webcam");
const canvas = document.getElementById("captureCanvas");
const photoError = document.getElementById("photoError");
const overlay = document.getElementById("scanOverlay");

startWebcam(video);

    const captureBtn = document.getElementById("captureBtn");
    const retakeBtnEl = document.getElementById('retakeBtn');
    const webcamFreeze = document.getElementById('webcamFreeze');
    document.getElementById("captureBtn").addEventListener("click", () => {
    overlay.classList.add("active");
    setTimeout(() => {
        capturedImage = captureFrame(video, canvas);
        // show freeze over webcam and pause video
        webcamFreeze.src = capturedImage;
        webcamFreeze.style.display = 'block';
        try { video.pause(); } catch (e) {}
        // show freeze overlay and hide overlay
        photoError.style.display = "none";
        overlay.classList.remove("active");
        // toggle buttons
        captureBtn.classList.add('d-none');
        retakeBtnEl.classList.remove('d-none');
    }, 500);
});

document.getElementById('department').addEventListener('change', (e) => {
    const wrap = document.getElementById('otherDeptWrap');
    if (e.target.value === '__other__') {
        wrap.classList.remove('d-none');
    } else {
        wrap.classList.add('d-none');
    }
});

// Retake button logic
retakeBtnEl.addEventListener('click', () => {
    capturedImage = null;
    webcamFreeze.style.display = 'none';
    // resume video
    try { if (video.srcObject) video.play(); } catch (e) {}
    retakeBtnEl.classList.add('d-none');
    captureBtn.classList.remove('d-none');
});

document.getElementById("enrollForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    photoError.style.display = "none";
    if (!capturedImage) {
        document.getElementById("statusMsg").innerHTML = '<div class="alert alert-warning">Please capture a photo first.</div>';
        return;
    }
    const fd = new FormData(e.target);
    var dept = fd.get("department");
    if (dept === "__other__") {
        dept = fd.get("department_other");
    }
    const payload = {
        full_name: fd.get("full_name"),
        role: fd.get("role"),
        department: dept,
        contact: fd.get("contact"),
        centre: fd.get("centre"),
        photo: capturedImage,
    };
    document.getElementById("statusMsg").innerHTML = '<div class="alert alert-info">Submitting...</div>';
    try {
        const res = await fetch("/admin/enroll", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.success) {
            document.getElementById("statusMsg").innerHTML = '<div class="alert alert-success">Enrolled successfully!</div>';
            document.getElementById('enrollForm').reset();
            capturedImage = null;
            webcamFreeze.style.display = 'none';
            try { if (video.srcObject) video.play(); } catch (e) {}
            retakeBtnEl.classList.add('d-none');
            captureBtn.classList.remove('d-none');
        } else {
            if (data.error && data.error.includes("No face detected")) {
                photoError.textContent = data.error;
                photoError.style.display = "block";
                document.getElementById("statusMsg").innerHTML = "";
            } else {
                document.getElementById("statusMsg").innerHTML = `<div class="alert alert-danger">${data.error || "Enrollment failed."}</div>`;
            }
        }
    } catch {
        document.getElementById("statusMsg").innerHTML = '<div class="alert alert-danger">Network error.</div>';
    }
});
</script>
{% endblock %}
